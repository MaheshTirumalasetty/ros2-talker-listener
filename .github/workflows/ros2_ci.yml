name: ROS 2 CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ROS_DISTRO: humble
  IMAGE_NAME: ros2-talker-listener

jobs:
  # Job 1 — Build and Test (x86)
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup ROS 2 Humble
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble

    - name: Create ROS 2 workspace
      run: |
        mkdir -p ~/ros2_ws/src
        cp -r $GITHUB_WORKSPACE ~/ros2_ws/src/talker_listener

    - name: Install dependencies with rosdep
      run: |
        source /opt/ros/humble/setup.bash
        cd ~/ros2_ws
        rosdep update
        rosdep install \
          --from-paths src \
          --ignore-src \
          --rosdistro humble \
          -y

    - name: Build with colcon
      run: |
        source /opt/ros/humble/setup.bash
        cd ~/ros2_ws
        colcon build \
          --event-handlers console_direct+

    - name: Run tests
      run: |
        source /opt/ros/humble/setup.bash
        cd ~/ros2_ws
        source install/setup.bash
        colcon test \
          --event-handlers console_direct+
        colcon test-result --verbose

  # Job 2 — Multi-Architecture Docker Build
  docker-build:
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image for x86_64
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: false
        tags: ${{ env.IMAGE_NAME }}:amd64-latest
        cache-from: type=gflags
        cache-to: type=inline

    - name: Build Docker image for ARM64
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/arm64
        push: false
        tags: ${{ env.IMAGE_NAME }}:arm64-latest

    - name: Build Multi-Platform Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: false
        tags: |
          ${{ env.IMAGE_NAME }}:latest
          ${{ env.IMAGE_NAME }}:humble