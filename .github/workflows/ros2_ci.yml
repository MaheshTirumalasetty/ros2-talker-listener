name: ROS 2 CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ROS_DISTRO: humble

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup ROS 2 Humble
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble

    - name: Create ROS 2 workspace
      run: |
        mkdir -p ~/ros2_ws/src
        cp -r $GITHUB_WORKSPACE ~/ros2_ws/src/talker_listener

    - name: Install dependencies with rosdep
      run: |
        source /opt/ros/humble/setup.bash
        cd ~/ros2_ws
        rosdep update
        rosdep install \
          --from-paths src \
          --ignore-src \
          --rosdistro humble \
          -y

    - name: Build with colcon
      run: |
        source /opt/ros/humble/setup.bash
        cd ~/ros2_ws
        colcon build \
          --event-handlers console_direct+

    - name: Run tests
      run: |
        source /opt/ros/humble/setup.bash
        cd ~/ros2_ws
        source install/setup.bash
        colcon test \
          --event-handlers console_direct+
        colcon test-result --verbose